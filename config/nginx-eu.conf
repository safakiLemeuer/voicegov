server {
    listen 80;
    server_name eu.thebhtlabs.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eu.thebhtlabs.com;

    ssl_certificate     /etc/letsencrypt/live/eu.thebhtlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eu.thebhtlabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/voicegov-scanner/web;
    index eu-audit.html;

    location / {
        try_files $uri $uri/ /eu-audit.html;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    access_log /var/log/nginx/eu.thebhtlabs.com.access.log;
    error_log  /var/log/nginx/eu.thebhtlabs.com.error.log;
}
