# config/nginx.conf — Nginx reverse proxy for VoiceGov Scanner
# Copy to: /etc/nginx/sites-available/voicegov
# Symlink: ln -s /etc/nginx/sites-available/voicegov /etc/nginx/sites-enabled/
# Then: certbot --nginx -d voicegov.thebhtlabs.com && nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name voicegov.thebhtlabs.com;

    # API + Twilio webhooks
    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket for Twilio media streams
    location /ws/ {
        proxy_pass http://127.0.0.1:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Public leaderboard
    location /leaderboard {
        proxy_pass http://127.0.0.1:3501/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
